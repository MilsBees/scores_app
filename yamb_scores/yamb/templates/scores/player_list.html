{% extends "scores/base.html" %}
{% block content %}
  <h2>Players</h2>
  
  <div class="card" style="margin-bottom: 1.5rem;">
    <a href="{% url 'scores:new_player' %}" style="padding: 0.5rem 1rem; background: #4ecdc4; color: white; text-decoration: none; border-radius: 4px; display: inline-block;">+ Add New Player</a>
  </div>
  
  {% if players %}
    <table>
      <thead>
        <tr>
          <th>Player Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for player in players %}
        <tr>
          <td>{{ player.name }}</td>
          <td>
            <a href="{% url 'scores:edit_player' player.id %}" style="color: #4ecdc4; text-decoration: none; margin-right: 1rem;">Edit</a>
            <a href="{% url 'scores:delete_player' player.id %}" style="color: #dc3545; text-decoration: none;">Delete</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <div class="card">
      <p>No players yet. <a href="{% url 'scores:new_player' %}">Create one now</a>.</p>
    </div>
  {% endif %}
{% endblock %}
