{% extends "scores/base.html" %}
{% block content %}
  <h2>Delete Player</h2>
  
  <div class="card" style="background: #fee; border: 2px solid #c33; margin-bottom: 1.5rem;">
    <strong style="color: #c33;">Are you sure you want to delete this player?</strong>
    <p>Player: <strong>{{ player.name }}</strong></p>
    <p style="color: #666; font-size: 0.9rem;">⚠️ This action cannot be undone. All associated scores and games will be removed.</p>
  </div>
  
  <form method="post">
    {% csrf_token %}
    <button type="submit" style="padding: 0.5rem 1rem; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;">Delete Player</button>
    <a href="{% url 'scores:player_list' %}" style="padding: 0.5rem 1rem; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; display: inline-block; margin-left: 0.5rem;">Cancel</a>
  </form>
{% endblock %}
