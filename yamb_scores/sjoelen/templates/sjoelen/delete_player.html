{% extends "sjoelen/base.html" %}
{% block content %}
  <h2>Delete Player</h2>
  
  <div class="card" style="background: #fee; border: 2px solid #c33;">
    <p style="color: #c33;"><strong>Warning:</strong> Deleting player "{{ player.name }}" will remove all associated data. This action cannot be undone.</p>
  </div>
  
  <form method="post" class="card">
    {% csrf_token %}
    <p>Are you sure you want to delete <strong>{{ player.name }}</strong>?</p>
    <div style="display: flex; gap: 1rem;">
      <button type="submit" class="btn-danger">Yes, Delete</button>
      <a href="{% url 'sjoelen:player_list' %}" class="btn-secondary">Cancel</a>
    </div>
  </form>
{% endblock %}
