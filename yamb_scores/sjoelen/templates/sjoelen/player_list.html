{% extends "sjoelen/base.html" %}
{% block content %}
  <h2>Players</h2>
  
  <div class="card" style="margin-bottom: 1.5rem;">
    <a href="{% url 'sjoelen:new_player' %}" class="btn-primary-action">+ Add New Player</a>
  </div>
  
  {% if players %}
    <table>
      <thead>
        <tr>
          <th>Player Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for player in players %}
        <tr>
          <td>{{ player.name }}</td>
          <td>
            <a href="{% url 'sjoelen:edit_player' player.id %}" style="color: #ffd93d; text-decoration: none; margin-right: 1rem;">Edit</a>
            <a href="{% url 'sjoelen:delete_player' player.id %}" style="color: #dc3545; text-decoration: none;">Delete</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <div class="card">
      <p>No players yet. <a href="{% url 'sjoelen:new_player' %}">Create one now</a>.</p>
    </div>
  {% endif %}
{% endblock %}
