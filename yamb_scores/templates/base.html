<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block page_title %}Scores App{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, Arial; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.75rem; margin: 0 0 1rem 0; }
    h2 { font-size: 1.5rem; margin: 1.5rem 0 1rem 0; }
    h3 { font-size: 1.25rem; margin: 1.25rem 0 0.75rem 0; }
    header { margin-bottom: 1rem; }
    nav { margin-bottom: 2rem; }
    nav a { margin-right: 1rem; display: inline-block; margin-bottom: 0.5rem; padding: 0.5rem 1rem; background: #4ecdc4; color: white; text-decoration: none; border-radius: 4px; }
    nav a:hover { background: #3ab3aa; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 0.5rem; border-bottom: 1px solid #ddd; text-align: left; }
    .card { padding: 1rem; border: 1px solid #eee; border-radius: 6px; background: #fafafa; margin-bottom: 1rem; }
    .error-message { 
      background: #fee; 
      border: 2px solid #c33; 
      color: #c33; 
      padding: 1rem; 
      margin-bottom: 1.5rem; 
      border-radius: 4px;
      font-weight: 500;
    }
    .error-message strong { 
      display: block; 
      margin-bottom: 0.5rem; 
      font-size: 1.1rem;
    }
    .error-message div { 
      margin-top: 0.25rem; 
    }
    .field-error {
      color: #c33;
      margin-top: 0.25rem;
      font-size: 0.9rem;
    }
    input[type="text"], input[type="number"], input[type="date"], select {
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }
    button[type="submit"] {
      padding: 0.5rem 1rem;
      background: #4ecdc4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button[type="submit"]:hover {
      background: #3ab3aa;
    }
    button.btn-success {
      background: #28a745;
    }
    button.btn-success:hover {
      background: #218838;
    }
    table th a,
    table th a:visited,
    table td a,
    table td a:visited {
      color: inherit;
      text-decoration: none;
    }
    table th a:hover,
    table td a:hover {
      text-decoration: underline;
    }
    table th a.sorted {
      text-decoration: underline;
      font-weight: 600;
    }
    .sort-indicator {
      margin-left: 0.25rem;
      font-size: 0.9em;
      opacity: 0.75;
    }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #ddd; text-align: center; font-size: 0.9rem; color: #666; }
    footer a { color: #4ecdc4; text-decoration: none; }
    
    @media (max-width: 600px) {
      body { margin: 1rem auto; padding: 0 0.5rem; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.25rem; }
      h3 { font-size: 1.1rem; }
      nav a { font-size: 0.95rem; margin-right: 0.75rem; }
      th, td { padding: 0.35rem; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav>
    <a href="{% url 'home:home' %}">← Back to home</a>
  </nav>
  <h1>{% block title %}{% endblock %}</h1>
  <nav>
    {% block nav_main %}{% endblock %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <a href="/admin/">Admin</a>
    {% block footer %}{% endblock %}
  </footer>
</body>
</html>
