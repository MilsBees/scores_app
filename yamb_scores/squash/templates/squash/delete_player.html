{% extends "squash/base.html" %}
{% block content %}
  <h2>Delete Player</h2>
  
  <div class="card" style="background: #fee; border: 2px solid #c33;">
    <p style="color: #c33;"><strong>Warning:</strong> Deleting player "{{ player.name }}" will remove all associated data. This action cannot be undone.</p>
  </div>
  
  <form method="post" class="card">
    {% csrf_token %}
    <p>Are you sure you want to delete <strong>{{ player.name }}</strong>?</p>
    <div style="display: flex; gap: 1rem;">
      <button type="submit" style="padding: 0.5rem 1rem; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;">Yes, Delete</button>
      <a href="{% url 'squash:player_list' %}" style="padding: 0.5rem 1rem; background: #999; color: white; text-decoration: none; border-radius: 4px; display: inline-block;">Cancel</a>
    </div>
  </form>
{% endblock %}
