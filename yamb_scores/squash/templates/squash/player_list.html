{% extends "squash/base.html" %}
{% block content %}
  <h2>Players</h2>
  <p><a href="{% url 'squash:new_player' %}" class="btn-primary-action">+ New Player</a></p>
  
  {% if players %}
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for player in players %}
          <tr>
            <td>{{ player.name }}</td>
            <td>
              <a href="{% url 'squash:edit_player' player.id %}">Edit</a>
              <a href="{% url 'squash:delete_player' player.id %}" style="color: #dc3545;">Delete</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  {% else %}
    <p>No players yet. <a href="{% url 'squash:new_player' %}">Create one</a>.</p>
  {% endif %}
{% endblock %}
