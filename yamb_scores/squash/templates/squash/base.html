<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squash</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, Arial; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.75rem; margin: 0 0 1rem 0; }
    h2 { font-size: 1.5rem; margin: 1.5rem 0 1rem 0; }
    h3 { font-size: 1.25rem; margin: 1.25rem 0 0.75rem 0; }
    nav { margin-bottom: 2rem; }
    nav a { margin-right: 1rem; display: inline-block; margin-bottom: 0.5rem; padding: 0.5rem 1rem; background: #4ecdc4; color: white; text-decoration: none; border-radius: 4px; }
    nav a:hover { background: #3ab3aa; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 0.5rem; border-bottom: 1px solid #ddd; text-align: left; }
    .card { padding: 1rem; border: 1px solid #eee; border-radius: 6px; background: #fafafa; margin-bottom: 1rem; }
    input[type="text"], input[type="number"], input[type="date"], select {
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }
    button[type="submit"] {
      padding: 0.5rem 1rem;
      background: #4ecdc4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button[type="submit"]:hover {
      background: #3ab3aa;
    }
    
    @media (max-width: 600px) {
      body { margin: 1rem auto; padding: 0 0.5rem; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.25rem; }
      h3 { font-size: 1.1rem; }
      nav a { font-size: 0.95rem; margin-right: 0.75rem; }
      th, td { padding: 0.35rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'home:home' %}">← Back to home</a>
  </nav>
  <h1>Squash</h1>
  <nav>
    <a href="{% url 'squash:new_match' %}">New match</a>
    <a href="{% url 'squash:match_list' %}">Matches</a>
    <a href="{% url 'squash:leaderboard' %}">Leaderboard</a>
    <a href="{% url 'squash:h2h' %}">H2H</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
