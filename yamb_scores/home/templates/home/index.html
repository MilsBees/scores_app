<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scores App</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: system-ui, Arial; 
      margin: 0; 
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 3rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .tile {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-decoration: none;
      color: inherit;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .tile:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    .tile h2 {
      margin: 0 0 1rem 0;
      font-size: 1.8rem;
      color: #333;
    }
    .tile p {
      color: #666;
      margin: 0;
      font-size: 0.95rem;
    }
    .tile.yamb { border-top: 4px solid #ff6b6b; }
    .tile.squash { border-top: 4px solid #6c63ff; }
    .tile.sjoelen { border-top: 4px solid #ffd93d; }
    
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .tiles { gap: 1.5rem; }
      .tile { padding: 1.5rem; }
      .tile h2 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Scores</h1>
    <div class="tiles">
      <a href="{% url 'yamb:index' %}" class="tile yamb">
        <h2>Yamb</h2>
        <p>Track your Yamb dice game scores</p>
      </a>
      <a href="{% url 'squash:index' %}" class="tile squash">
        <h2>Squash</h2>
        <p>Track your squash matches</p>
      <a href="{% url 'sjoelen:index' %}" class="tile sjoelen">
        <h2>Sjoelen</h2>
        <p>Track your Sjoelen game scores</p>
      </a>
      </a>
    </div>
  </div>
</body>
</html>
